<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Volunteer Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            📊 Volunteer Dashboard
        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

        </ul>

    </nav>

    <!-- DASHBOARD -->

    <section class="section">

        <h2>
            Volunteer Management Dashboard
        </h2>

        <p>
            View and search registered volunteers.
        </p>

        <br>

        <!-- TOTAL COUNT -->

        <div class="cards">

            <div class="card">

                <h3 id="count">
                    Total Volunteers : 0
                </h3>

                <p>
                    Registered Volunteers
                </p>

            </div>

        </div>

        <br><br>

        <!-- SEARCH -->

        <input
            type="text"
            id="search"
            placeholder="🔍 Search"
            onkeyup="searchVolunteer()">

        <br><br>

        <!-- TABLE -->

        <table>

            <thead>

                <tr>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Phone</th>

                    <th>College</th>

                    <th>Department</th>
                    
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </section>

    <!-- FOOTER -->

    <footer>

        <h3>NayePankh Foundation</h3>

        <p>
            Volunteer Management Dashboard
        </p>

        <p>
            © 2026 All Rights Reserved
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
